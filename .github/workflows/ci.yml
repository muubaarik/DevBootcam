name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      MONGO_URI_TEST: mongodb://127.0.0.1:27017/bootcomp_test
      JWT_SECRET: test_jwt_secret_for_ci_only
      JWT_EXPIRE: 30d
      JWT_COOKIE_EXPIRE: 30
      FILE_UPLOAD_PATH: ./public/uploads
      MAX_FILE_UPLOAD: 100000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure upload directory exists
        run: mkdir -p public/uploads

      - name: Run tests
        run: npm test
